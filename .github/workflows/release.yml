name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    name: ${{ matrix.awk }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - awk: awk
            runner: awk
          - awk: gawk
            runner: gawk
          - awk: busybox awk
            runner: busybox-awk

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install AWK implementations
        run: sudo apt-get update && sudo apt-get install -y busybox gawk

      - name: Create AWK runners
        run: |
          mkdir -p .ci-bin

          printf '%s\n' \
            '#!/bin/sh' \
            'exec awk "$@"' \
            > .ci-bin/awk

          printf '%s\n' \
            '#!/bin/sh' \
            'exec gawk "$@"' \
            > .ci-bin/gawk

          printf '%s\n' \
            '#!/bin/sh' \
            'exec busybox awk "$@"' \
            > .ci-bin/busybox-awk

          chmod +x .ci-bin/awk .ci-bin/gawk .ci-bin/busybox-awk

      - name: Run tests
        run: make test AWK="./.ci-bin/${{ matrix.runner }}"

  release:
    name: Build release
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build release asset
        run: |
          make build
          sha256sum build/awkuid > build/awkuid.sha256

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" \
              --clobber \
              build/awkuid#awkuid \
              build/awkuid.sha256#awkuid.sha256
          else
            gh release create "$TAG_NAME" \
              --verify-tag \
              --title "$TAG_NAME" \
              --generate-notes \
              build/awkuid#awkuid \
              build/awkuid.sha256#awkuid.sha256
          fi
